<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zombie Jump — 2eProduction</title>

<!-- PWA / Play Store meta tags -->
<meta name="description" content="The zombie horde is rising! Jump through the gaps, dodge the undead, and race to the top. 20 levels. 3 lives. No mercy.">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Zombie Jump">

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json">

<!-- Icons for iOS (Apple doesn't use manifest icons) -->
<link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512x512.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="96x96" href="./icons/icon-96x96.png">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  iframe {
    display: block;
    border: none;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<iframe src="./zombie_jump_godaddy.html"
        frameborder="0" scrolling="no" allowfullscreen>
</iframe>

<!-- PWA Service Worker registration (enables offline play + installability) -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('Zombie Jump: Service Worker registered'))
    .catch(err => console.log('SW registration skipped:', err));
}
</script>
</body>
</html>
